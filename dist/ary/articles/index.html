<script>
function switchLanguage(lang) {
    const currentPath = window.location.pathname;
    const currentLang = 'ary';
    const baseUrl = '/github-blog/dist';
    const multilingualEnabled = true;

    if (!multilingualEnabled) return;

    if (lang !== currentLang) {
        let newPath = currentPath.replace('/' + currentLang, '/' + lang);
        if (newPath === currentPath) {
            newPath = '/' + lang + currentPath;
        }
        if (baseUrl && newPath) {
            if (!newPath.startsWith(baseUrl)) {
                newPath = baseUrl + newPath;
            }
        }
        window.location.href = newPath;
    }
}

function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

function toggleMobileMenu() {
    const navMenu = document.querySelector('.nav-menu');
    const menuToggle = document.querySelector('.mobile-menu-toggle');
    if (navMenu && menuToggle) {
        navMenu.classList.toggle('active');
        menuToggle.classList.toggle('active');
        document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : '';
    }
}

(function() {
    const savedTheme = localStorage.getItem('theme');
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
        document.documentElement.classList.add('dark');
    }
})();

document.addEventListener('click', function(e) {
    const navMenu = document.querySelector('.nav-menu');
    const menuToggle = document.querySelector('.mobile-menu-toggle');
    if (navMenu && navMenu.classList.contains('active') && 
        !navMenu.contains(e.target) && 
        menuToggle && !menuToggle.contains(e.target)) {
        navMenu.classList.remove('active');
        menuToggle.classList.remove('active');
        document.body.style.overflow = '';
    }
});
</script>
